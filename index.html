<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IdeaForge Auth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-bg"></div>

    <!-- Top navigation bar -->
    <header class="topbar">
      <div class="brand" aria-label="IdeaForge home">
        <span class="brand-mark" aria-hidden="true">IF</span>
        <span class="brand-text">IdeaForge</span>
      </div>

      <nav class="nav-links" aria-label="Primary">
        <a href="#" id="navLogin" class="nav-link active" data-view="login"
          >Login</a
        >
        <button id="navRegister" class="nav-register" data-view="register">
          Register
        </button>
      </nav>
    </header>

    <main class="auth-shell">
      <section class="auth-card" aria-live="polite">
        <!-- Login view -->
        <div id="loginView" class="auth-view active-view">
          <h1 class="auth-title">Login to IdeaForge</h1>

          <form id="loginForm" novalidate>
            <div class="field-group">
              <label for="loginEmail">Email</label>
              <input
                id="loginEmail"
                name="email"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
              />
              <p class="field-error" id="loginEmailError"></p>
            </div>

            <div class="field-group">
              <label for="loginPassword">Password</label>
              <input
                id="loginPassword"
                name="password"
                type="password"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
              <p class="field-error" id="loginPasswordError"></p>
            </div>

            <button type="submit" class="primary-btn">Login</button>
            <p class="submit-message" id="loginSubmitMessage"></p>
          </form>

          <p class="switch-text">
            Don't have an account?
            <a href="#" class="switch-link" data-view="register">Register</a>
          </p>
        </div>

        <!-- Register view -->
        <div id="registerView" class="auth-view" aria-hidden="true">
          <h1 class="auth-title">Create your IdeaForge account</h1>

          <form id="registerForm" novalidate>
            <div class="field-group">
              <label for="registerName">Name</label>
              <input
                id="registerName"
                name="name"
                type="text"
                placeholder="Your full name"
                autocomplete="name"
              />
              <p class="field-error" id="registerNameError"></p>
            </div>

            <div class="field-group">
              <label for="registerEmail">Email</label>
              <input
                id="registerEmail"
                name="email"
                type="email"
                placeholder="you@example.com"
                autocomplete="email"
              />
              <p class="field-error" id="registerEmailError"></p>
            </div>

            <div class="field-group">
              <label for="registerPassword">Password</label>
              <input
                id="registerPassword"
                name="password"
                type="password"
                placeholder="Create a password"
                autocomplete="new-password"
              />
              <p class="field-error" id="registerPasswordError"></p>
            </div>

            <div class="field-group">
              <label for="registerConfirmPassword">Confirm Password</label>
              <input
                id="registerConfirmPassword"
                name="confirmPassword"
                type="password"
                placeholder="Confirm your password"
                autocomplete="new-password"
              />
              <p class="field-error" id="registerConfirmPasswordError"></p>
            </div>

            <button type="submit" class="primary-btn">Register</button>
            <p class="submit-message" id="registerSubmitMessage"></p>
          </form>

          <p class="switch-text">
            Already have an account?
            <a href="#" class="switch-link" data-view="login">Login</a>
          </p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
